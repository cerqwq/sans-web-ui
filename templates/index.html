<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sans Web UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            text-align: center;
            padding: 20px 0;
        }

        .header h1 {
            font-size: 2em;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
        }

        .status-dot.offline {
            background: #ef4444;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
            color: white;
        }

        .message.assistant .message-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .message-time {
            font-size: 0.75em;
            opacity: 0.5;
            margin-top: 4px;
        }

        .input-area {
            padding: 20px 0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 8px;
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1em;
            padding: 8px 16px;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn {
            background: linear-gradient(135deg, #3a7bd5, #00d2ff);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .sidebar {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 16px;
            min-width: 200px;
        }

        .sidebar h3 {
            margin-bottom: 12px;
            font-size: 0.9em;
            opacity: 0.7;
        }

        .sidebar-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 0.85em;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 16px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { opacity: 0.5; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-4px); }
        }

        .loading {
            text-align: center;
            padding: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 Sans Web UI</h1>
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">连接中...</span>
                </div>
                <div class="status-item">
                    <span id="modelInfo">模型: --</span>
                </div>
                <div class="status-item">
                    <span id="toolsInfo">工具: --</span>
                </div>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant">
                <div class="message-content">
                    👋 你好！我是 Sans，你的智能语音助手。有什么我可以帮你的吗？
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
                <button class="btn" id="sendBtn" onclick="sendMessage()">发送</button>
                <button class="btn" id="clearBtn" onclick="clearHistory()">清空</button>
            </div>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <h3>📊 系统状态</h3>
        <div class="sidebar-item">
            <span>状态</span>
            <span id="sidebarStatus">--</span>
        </div>
        <div class="sidebar-item">
            <span>模型</span>
            <span id="sidebarModel">--</span>
        </div>
        <div class="sidebar-item">
            <span>工具</span>
            <span id="sidebarTools">--</span>
        </div>
        <div class="sidebar-item">
            <span>Agent</span>
            <span id="sidebarAgents">--</span>
        </div>
        <div class="sidebar-item">
            <span>消息</span>
            <span id="sidebarMessages">0</span>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // 加载状态
        async function loadStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                document.getElementById('statusDot').className = 'status-dot' + (data.sans_available ? '' : ' offline');
                document.getElementById('statusText').textContent = data.sans_available ? '已连接' : '未连接';
                document.getElementById('modelInfo').textContent = '模型: ' + data.current_model;
                document.getElementById('toolsInfo').textContent = '工具: ' + data.tools_count;

                document.getElementById('sidebarStatus').textContent = data.sans_available ? '✅ 在线' : '❌ 离线';
                document.getElementById('sidebarModel').textContent = data.current_model;
                document.getElementById('sidebarTools').textContent = data.tools_count;
                document.getElementById('sidebarAgents').textContent = data.agents_count;
            } catch (error) {
                console.error('加载状态失败:', error);
            }
        }

        // 加载历史
        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();

                data.messages.forEach(msg => {
                    addMessage(msg.role, msg.content, new Date(msg.timestamp));
                });
            } catch (error) {
                console.error('加载历史失败:', error);
            }
        }

        // 添加消息到界面
        function addMessage(role, content, time) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const timeStr = time ? time.toLocaleTimeString() : '';

            messageDiv.innerHTML = `
                <div class="message-content">${content}</div>
                <div class="message-time">${timeStr}</div>
            `;

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // 更新消息计数
            const count = document.querySelectorAll('.message').length;
            document.getElementById('sidebarMessages').textContent = count;
        }

        // 显示打字指示器
        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 移除打字指示器
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // 发送消息
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // 添加用户消息
            addMessage('user', message, new Date());
            messageInput.value = '';
            sendBtn.disabled = true;

            // 显示打字指示器
            showTypingIndicator();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.chunk) {
                                    fullResponse += data.chunk;
                                }
                            } catch (e) {}
                        }
                    }
                }

                // 移除打字指示器
                removeTypingIndicator();

                // 添加助手回复
                if (fullResponse) {
                    addMessage('assistant', fullResponse, new Date());
                }

            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', '抱歉，处理出错了: ' + error.message, new Date());
            }

            sendBtn.disabled = false;
            messageInput.focus();
        }

        // 清空历史
        async function clearHistory() {
            if (!confirm('确定要清空所有聊天记录吗？')) return;

            try {
                await fetch('/api/clear', { method: 'POST' });
                chatContainer.innerHTML = `
                    <div class="message assistant">
                        <div class="message-content">
                            👋 你好！我是 Sans，你的智能语音助手。有什么我可以帮你的吗？
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('清空失败:', error);
            }
        }

        // 回车发送
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 初始化
        loadStatus();
        loadHistory();

        // 定期更新状态
        setInterval(loadStatus, 30000);
    </script>
</body>
</html>
